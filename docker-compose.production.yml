# P1.13 — Production override (adds constraints, removes dev ports)
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up

services:
  postgres:
    ports: []  # No external port in production

  api:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "1G"
    environment:
      EMSALIST_LOG_LEVEL: WARNING
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    volumes:
      - upload_data:/data/uploads:rw
      - export_data:/data/exports:rw
      - backup_data:/data/backups:rw
      - case_store_data:/data/case_store:rw
      - document_store_data:/data/document_store:rw
