name: Mobile CI

on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  workflow_dispatch:

jobs:
  analyze_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Verify no generated code drift
        run: git diff --exit-code -- lib

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

  ios_build:
    name: iOS Simulator Build
    runs-on: macos-latest
    needs: analyze_test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flavor: [development, staging, production]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: List Xcode schemes and configurations
        working-directory: mobile/ios
        run: xcodebuild -list -workspace Runner.xcworkspace

      - name: Build iOS simulator (${{ matrix.flavor }})
        run: flutter build ios --simulator --no-codesign --flavor ${{ matrix.flavor }} --dart-define=APP_ENVIRONMENT=${{ matrix.flavor }}
