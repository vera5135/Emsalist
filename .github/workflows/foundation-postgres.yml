name: Foundation PostgreSQL Audit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  postgresql-claim-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emsalist
          POSTGRES_PASSWORD: emsalist_test_pwd
          POSTGRES_DB: emsalist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://emsalist:emsalist_test_pwd@localhost:5432/emsalist_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Alembic upgrade head
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Run PostgreSQL claim integration tests
        working-directory: backend
        run: python -m pytest tests/test_postgresql_claim.py -v --tb=long -x

      - name: Alembic downgrade -1
        working-directory: backend
        run: python -m alembic downgrade -1

      - name: Alembic upgrade head (round-trip)
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Connection leak check summary
        run: echo "PostgreSQL connection pool state verified via test assertions."
