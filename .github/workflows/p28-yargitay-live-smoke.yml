name: P2.8 Yargitay Live Smoke

on:
  workflow_dispatch:

jobs:
  live-smoke:
    name: Bounded Yargitay live corpus smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: emsalist
          POSTGRES_PASSWORD: smoke_secret_pwd
          POSTGRES_DB: emsalist_p28sy1_yargitay_corpus_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://emsalist:smoke_secret_pwd@localhost:5432/emsalist_p28sy1_yargitay_corpus_smoke
      OFFICIAL_PROVIDER_LIVE_SMOKE: "1"
      OFFICIAL_PROVIDER_YARGITAY_ENABLED: "1"
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify PostgreSQL health
        run: |
          for i in $(seq 1 20); do
            pg_isready -h localhost -p 5432 -U emsalist && break
            echo "waiting for postgres..."
            sleep 3
          done
          pg_isready -h localhost -p 5432 -U emsalist

      - name: Alembic upgrade head
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Run bounded Yargitay live smoke
        id: smoke
        working-directory: backend
        run: |
          python -m scripts.p28sy1_yargitay_corpus_smoke --confirm-live-smoke > /tmp/smoke-output.log 2>&1
          SMOKE_EXIT=$?
          echo "smoke_exit=$SMOKE_EXIT" >> $GITHUB_OUTPUT
          cat /tmp/smoke-output.log

          if [ "$SMOKE_EXIT" -ne 0 ]; then
            echo "SMOKE FAIL-CLOSED (exit=$SMOKE_EXIT)"
            grep "total_ingested=" /tmp/smoke-output.log || true
            grep "last_error=" /tmp/smoke-output.log || true
          fi

      - name: Prove ingestion records exist
        id: prove
        working-directory: backend
        run: |
          python -c "
          import asyncio, json
          from app.db.session import get_sessionmaker
          from app.db.models import SourceRecord, SourceVersion, SourceParagraph, SourceVerification
          from sqlalchemy import select

          async def prove():
              maker = get_sessionmaker()
              async with maker() as db:
                  records = (await db.execute(
                      select(SourceRecord).where(SourceRecord.source_type == 'supreme_court_decision')
                  )).scalars().all()

                  result = {'total_decisions': len(records), 'checks': {}}

                  result['checks']['has_source_records'] = len(records) >= 1
                  if not records:
                      print(json.dumps(result, ensure_ascii=False))
                      return 1

                  all_pass = True
                  for rec in records:
                      ver = (await db.execute(
                          select(SourceVersion).where(SourceVersion.id == rec.current_version_id)
                      )).scalar_one_or_none()

                      has_ver = ver is not None
                      has_paras = False
                      has_official = False
                      para_count = 0

                      if has_ver:
                          paras = (await db.execute(
                              select(SourceParagraph).where(SourceParagraph.source_version_id == ver.id)
                          )).scalars().all()
                          para_count = len(paras)
                          has_paras = para_count >= 1

                          verifications = (await db.execute(
                              select(SourceVerification).where(
                                  SourceVerification.source_record_id == rec.id,
                                  SourceVerification.source_version_id == ver.id,
                              )
                          )).scalars().all()
                          has_official = any(
                              v.verification_method == 'official_fetch_match'
                              and v.result == 'verified_official'
                              for v in verifications
                          )

                      if not has_official: all_pass = False
                      if not has_paras: all_pass = False

                      result[rec.id] = {
                          'has_version': has_ver,
                          'has_paragraphs': has_paras,
                          'paragraph_count': para_count,
                          'has_official_fetch': has_official,
                          'court': rec.court,
                          'chamber': rec.chamber,
                          'case_number': rec.case_number,
                      }

                  result['checks']['all_have_paragraphs'] = all_pass
                  print(json.dumps(result, ensure_ascii=False))
                  return 0 if all_pass else 1

          exit_code = asyncio.run(prove())
          import sys; sys.exit(exit_code)
          " > /tmp/ingestion-proof.json 2>&1

      - name: Fail on missing decisions
        if: steps.smoke.outputs.smoke_exit != '0' || failure()
        run: |
          echo "=== CRITICAL: YARGITAY LIVE SMOKE DID NOT INGEST DECISIONS ==="
          echo "Safe diagnostics from output:"
          grep -E "(SMOKE FAIL-CLOSED|last_error=|total_ingested=)" /tmp/smoke-output.log || true
          grep -E "(discovered=|fetched=|ingested=|duplicate=|failed=|status=|last_error=)" /tmp/smoke-output.log || true
          exit 1

      - name: Upload sanitized smoke evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: p2-8-yargitay-live-smoke-evidence
          path: |
            /tmp/smoke-output.log
            /tmp/ingestion-proof.json
          retention-days: 30

      - name: Smoke summary
        if: success()
        run: |
          echo "=== P2.8 YARGITAY LIVE SMOKE PASSED ==="
          echo "Head: ${{ github.sha }}"
          echo "Run ID: ${{ github.run_id }}"
          grep "total_ingested=" /tmp/smoke-output.log
          grep "live_requests=" /tmp/smoke-output.log
