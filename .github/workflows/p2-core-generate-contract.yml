name: P2 Core Generate Contract

on:
  push:
    branches: [feat/p2-core-value-dynamic-precedent-pool]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Apply candidate role fix and generate runtime OpenAPI
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/app/services/case_search_profile.py")
          text = path.read_text(encoding="utf-8")
          old = '(("alıcı", "müvekkil satın aldı", "satın aldım"), "Alıcı"),'
          new = '(("alıcı", "müvekkil satın aldı", "satın aldım", "satın aldı"), "Alıcı"),'
          if old not in text and new not in text:
              raise SystemExit("expected role mapping not found")
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

          cd backend
          python - <<'PY'
          import json
          from pathlib import Path
          from app.main import app

          target = Path("../docs/api/openapi-v1.json")
          target.write_text(
              json.dumps(app.openapi(), sort_keys=True, indent=2),
              encoding="utf-8",
          )
          print(target)
          PY

          python -m pytest tests/test_case_search_profile.py -q
          python -m pytest tests/test_api_contract.py::OpenAPIDriftDetectionTests::test_repository_openapi_matches_runtime_schema -q

      - name: Commit generated contract and remove temporary workflow
        if: github.event_name == 'push'
        run: |
          set -e
          rm .github/workflows/p2-core-generate-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/services/case_search_profile.py docs/api/openapi-v1.json .github/workflows/p2-core-generate-contract.yml
          git commit -m "fix(search): align case profile runtime contract"
          git push origin HEAD:feat/p2-core-value-dynamic-precedent-pool
