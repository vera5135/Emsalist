name: P2 Core Validate Dynamic Pool

on:
  push:
    branches: [feat/p2-core-value-dynamic-precedent-pool]

permissions:
  contents: write

jobs:
  validate-dynamic-pool:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emsalist
          POSTGRES_PASSWORD: emsalist_test_pwd
          POSTGRES_DB: emsalist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      EMSALIST_ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://emsalist:emsalist_test_pwd@localhost:5432/emsalist_test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Run focused product-value tests
        working-directory: backend
        run: |
          python -m alembic upgrade head
          python -m pytest \
            tests/test_dynamic_precedent_pool_service.py \
            tests/test_case_search_profile.py \
            tests/test_yargitay_live_provider_contract.py \
            -q

      - name: Generate and verify runtime OpenAPI
        working-directory: backend
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from app.main import app

          Path('../docs/api/openapi-v1.json').write_text(
              json.dumps(app.openapi(), sort_keys=True, indent=2),
              encoding='utf-8',
          )
          PY
          python -m pytest \
            tests/test_api_contract.py::OpenAPIDriftDetectionTests::test_repository_openapi_matches_runtime_schema \
            -q

      - name: Commit generated contract and remove temporary workflow
        run: |
          set -euo pipefail
          rm .github/workflows/p2-core-validate-dynamic-pool.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi-v1.json .github/workflows/p2-core-validate-dynamic-pool.yml
          git commit -m "fix(search): synchronize dynamic pool API contract"
          git push origin HEAD:feat/p2-core-value-dynamic-precedent-pool
