name: P1.14 Final Acceptance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  environment-report:
    name: Environment report
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Environment report
        run: |
          set -e
          echo "=== SYSTEM ==="
          uname -a
          echo ""
          echo "=== PYTHON ==="
          python3 --version || python --version
          echo ""
          echo "=== DOCKER ==="
          docker version
          echo ""
          echo "=== DOCKER COMPOSE ==="
          docker compose version
          echo ""
          echo "=== PSQL ==="
          psql --version || echo "psql not found (expected before service start)"
          echo ""
          echo "=== GIT ==="
          git rev-parse HEAD

  collection-check:
    name: Test collection
    needs: environment-report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emsalist
          POSTGRES_PASSWORD: emsalist_test_pwd
          POSTGRES_DB: emsalist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://emsalist:emsalist_test_pwd@localhost:5432/emsalist_test
      EMSALIST_ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Collection check
        working-directory: backend
        run: |
          set -e
          COLLECT_OUTPUT=$(python -m pytest --collect-only -q --no-header 2>&1)
          echo "$COLLECT_OUTPUT"
          COLLECT_ERRORS=$(echo "$COLLECT_OUTPUT" | grep -c "ERROR\|ERROR collecting\|!!!!!!!!!!!!" || true)
          if [ "$COLLECT_ERRORS" -gt 0 ]; then
            echo "FAIL: Collection errors detected: $COLLECT_ERRORS"
            exit 1
          fi
          echo "PASS: Clean collection"

  migration-check:
    name: PostgreSQL migration
    needs: environment-report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emsalist
          POSTGRES_PASSWORD: emsalist_test_pwd
          POSTGRES_DB: emsalist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      EMSALIST_ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://emsalist:emsalist_test_pwd@localhost:5432/emsalist_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U emsalist -d emsalist_test; then
              echo "PostgreSQL ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "FAIL: PostgreSQL did not become ready"
              exit 1
            fi
            sleep 2
          done

      - name: Alembic heads check
        working-directory: backend
        run: |
          set -e
          HEADS=$(python -m alembic heads 2>&1)
          echo "$HEADS"
          HEAD_COUNT=$(echo "$HEADS" | wc -l)
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "FAIL: Multiple alembic heads: $HEAD_COUNT"
            exit 1
          fi
          echo "PASS: Single alembic head"

      - name: Alembic upgrade head
        working-directory: backend
        run: |
          set -e
          python -m alembic upgrade head
          echo "PASS: Upgrade head succeeded"

      - name: Alembic current
        working-directory: backend
        run: |
          set -e
          python -m alembic current
          echo "PASS: Current revision shown"

      - name: Alembic check (model/migration drift)
        working-directory: backend
        run: |
          set -e
          python -m alembic check
          echo "PASS: Migration check complete"

      - name: Alembic downgrade -1 then upgrade
        working-directory: backend
        run: |
          set -e
          python -m alembic downgrade -1
          python -m alembic upgrade head
          echo "PASS: Downgrade/upgrade round-trip"

  purge-tests:
    name: Purge tests
    needs: collection-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emsalist
          POSTGRES_PASSWORD: emsalist_test_pwd
          POSTGRES_DB: emsalist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      EMSALIST_ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://emsalist:emsalist_test_pwd@localhost:5432/emsalist_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U emsalist -d emsalist_test; then
              echo "PostgreSQL ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "FAIL: PostgreSQL did not become ready"
              exit 1
            fi
            sleep 2
          done

      - name: Run migrations
        working-directory: backend
        run: |
          set -e
          python -m alembic upgrade head
          echo "PASS: Migrations applied"

      - name: Run purge tests individually
        working-directory: backend
        run: |
          set -e
          python -m pytest tests/test_lifecycle.py::PurgeTests::test_apply_purges_eligible -v --tb=long
          python -m pytest tests/test_lifecycle.py::PurgeTests::test_purge_is_idempotent -v --tb=long
          python -m pytest tests/test_lifecycle.py::StoreLifecycleTests::test_json_purge_removes -v --tb=long
          python -m pytest tests/test_lifecycle.py::PurgeTests::test_purge_db_failure_does_not_report_success -v --tb=long
          python -m pytest tests/test_lifecycle.py::PurgeTests::test_partial_purge_creates_audit_event -v --tb=long
          python -m pytest tests/test_lifecycle.py::PurgeTests::test_partial_purge_is_retried -v --tb=long
          python -m pytest tests/test_lifecycle.py::PurgeTests::test_retry_cleans_remaining_db_graph -v --tb=long
          python -m pytest tests/test_lifecycle.py::PurgeTests::test_retry_after_json_removal_is_idempotent -v --tb=long
          echo "PASS: Purge tests passed"

      - name: Run all purge-related tests
        working-directory: backend
        run: |
          set -e
          python -m pytest tests/test_lifecycle.py::PurgeTests -v --tb=short
          python -m pytest tests/test_lifecycle.py::StoreLifecycleTests -v --tb=short
          echo "PASS: All purge tests passed"

  full-test-suite:
    name: Full test suite
    needs: [collection-check, migration-check, purge-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emsalist
          POSTGRES_PASSWORD: emsalist_test_pwd
          POSTGRES_DB: emsalist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      EMSALIST_ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://emsalist:emsalist_test_pwd@localhost:5432/emsalist_test
      BACKUP_ENCRYPTION_ENABLED: true
      BACKUP_ENCRYPTION_KEY: p1-14-test-key-32chars-long!
      EMSALIST_BACKUP_ROOT: /tmp/emsalist-test-backups
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements-test.txt

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U emsalist -d emsalist_test; then
              echo "PostgreSQL ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "FAIL: PostgreSQL did not become ready"
              exit 1
            fi
            sleep 2
          done

      - name: Run migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Run full test suite
        working-directory: backend
        run: |
          set -o pipefail
          python -m pytest -vv --tb=long \
            --junitxml=pytest-full.xml \
            2>&1 | tee pytest-full.log
        shell: bash

      - name: Upload full test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p1-14-full-test-results
          path: |
            backend/pytest-full.log
            backend/pytest-full.xml
          if-no-files-found: error
          retention-days: 14

      - name: Test summary
        if: always()
        run: echo "Full test suite completed."

  docker-build:
    name: Docker image build
    needs: full-test-suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set build args
        id: args
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Docker build
        run: |
          docker build \
            --build-arg BUILD_COMMIT=${{ steps.args.outputs.commit }} \
            --build-arg BUILD_TIMESTAMP=${{ steps.args.outputs.timestamp }} \
            -t emsalist:p1.14 .

      - name: Verify non-root user
        run: |
          USER=$(docker run --rm --entrypoint whoami emsalist:p1.14)
          if [ "$USER" = "root" ]; then
            echo "FAIL: Running as root"
            exit 1
          fi
          echo "PASS: Running as $USER"

      - name: Verify Python version
        run: |
          VER=$(docker run --rm emsalist:p1.14 python --version)
          echo "$VER"
          echo "$VER" | grep -q "3.12" || { echo "FAIL: Wrong Python version"; exit 1; }
          echo "PASS: Python 3.12"

      - name: Verify no .env in image
        run: |
          if docker run --rm emsalist:p1.14 ls /app/.env 2>/dev/null; then
            echo "FAIL: .env found in image"
            exit 1
          fi
          echo "PASS: No .env in image"

      - name: Verify no .git in image
        run: |
          if docker run --rm emsalist:p1.14 ls -d /app/.git 2>/dev/null; then
            echo "FAIL: .git found in image"
            exit 1
          fi
          echo "PASS: No .git in image"

      - name: Verify healthcheck defined
        run: |
          HEALTHCHECK=$(docker inspect emsalist:p1.14 --format '{{json .Config.Healthcheck}}')
          if [ "$HEALTHCHECK" = "null" ]; then
            echo "FAIL: No healthcheck defined"
            exit 1
          fi
          echo "PASS: Healthcheck defined: $HEALTHCHECK"

      - name: Verify app import
        run: |
          docker run --rm emsalist:p1.14 python -c "from app.main import app; print('PASS: App imports OK')"

      - name: Inspect image size
        run: docker images emsalist:p1.14

      - name: Inspect image
        run: docker image inspect emsalist:p1.14

      - name: Docker history
        run: docker history --no-trunc emsalist:p1.14

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@6c3f29c0b5829cf0c4da20bb7188d5911abaa6ab
        with:
          image-ref: emsalist:p1.14
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@6c3f29c0b5829cf0c4da20bb7188d5911abaa6ab
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Pip audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc on --fail-on-known-vulnerability --no-deps

      - name: Bandit scan
        working-directory: backend
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json --severity-level high -x app/web

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

  compose-stack:
    name: Compose stack verification
    needs: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DB_PASSWORD: p1.14_acceptance_pwd
      JWT_SECRET_KEY: p1.14-acceptance-jwt-key-32-chars-long-
      AUTH_MODE: jwt
      ALLOWED_HOSTS: localhost,127.0.0.1,api
      CORS_ALLOW_ORIGINS: http://localhost:8000
      GEMINI_ENABLED: "false"
      BACKUP_ENCRYPTION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set build args
        id: args
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            --build-arg BUILD_COMMIT=${{ steps.args.outputs.commit }} \
            --build-arg BUILD_TIMESTAMP=${{ steps.args.outputs.timestamp }} \
            -t emsalist-api:latest .

      - name: Validate compose config
        run: |
          set -e
          docker compose -f docker-compose.yml -f docker-compose.production.yml config
          echo "PASS: Compose config is valid"

      - name: Start compose stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.production.yml up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            if curl -s http://localhost:8000/live | grep -q alive; then
              echo "API ready after ${i}s"
              break
            fi
            echo "Waiting for API... ($i)"
            sleep 2
          done

      - name: Verify compose services
        run: |
          docker compose ps
          docker compose logs --no-color migration 2>/dev/null
          docker compose logs --no-color api --tail=20 2>/dev/null

      - name: Verify live endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/live)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /live returned $STATUS"
            exit 1
          fi
          echo "PASS: /live returns $STATUS"

      - name: Verify ready endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ready)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /ready returned $STATUS"
            exit 1
          fi
          echo "PASS: /ready returns $STATUS"

      - name: Verify health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health status: $STATUS"
          curl -s http://localhost:8000/health | python -m json.tool 2>/dev/null || curl -s http://localhost:8000/health

      - name: API smoke test
        run: |
          set -e
          # /api/v1/meta/version
          VERSION=$(curl -s http://localhost:8000/api/v1/meta/version)
          echo "Version: $VERSION"
          echo "$VERSION" | python -c "import sys,json; d=json.load(sys.stdin); assert d.get('application')=='emsalist', 'Bad version response'"
          echo "PASS: meta/version"

          # /api/v1/meta/capabilities
          CAPS=$(curl -s http://localhost:8000/api/v1/meta/capabilities)
          echo "Capabilities: $CAPS"
          echo "$CAPS" | python -c "import sys,json; d=json.load(sys.stdin); assert 'features' in d, 'Bad capabilities response'"
          echo "PASS: meta/capabilities"

      - name: Cleanup compose
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.production.yml down -v

  openapi-check:
    name: OpenAPI drift check
    needs: full-test-suite
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Generate runtime OpenAPI
        working-directory: backend
        run: |
          python -c "
          from app.main import app
          import json
          schema = app.openapi()
          with open('/tmp/runtime-openapi.json', 'w') as f:
              json.dump(schema, f, sort_keys=True, indent=2)
          "

      - name: Compare OpenAPI schemas
        run: |
          set -e
          python -c "
          import json, sys
          with open('docs/api/openapi-v1.json') as f:
              repo = json.load(f)
          with open('/tmp/runtime-openapi.json') as f:
              runtime = json.load(f)
          repo_json = json.dumps(repo, sort_keys=True, indent=2)
          runtime_json = json.dumps(runtime, sort_keys=True, indent=2)
          if repo_json != runtime_json:
              print('FAIL: OpenAPI drift detected')
              sys.exit(1)
          print('PASS: OpenAPI schema matches repository')
          "

      - name: Count operation IDs
        working-directory: backend
        run: |
          python -c "
          from app.main import app
          schema = app.openapi()
          ops = []
          for path, methods in schema.get('paths', {}).items():
              if not path.startswith('/api/v1'):
                  continue
              for method in methods:
                  if method in ('get','post','put','delete','patch'):
                      opid = methods[method].get('operationId', '')
                      if opid:
                          ops.append(opid)
          print(f'V1 operation IDs: {len(ops)}')
          assert len(ops) == len(set(ops)), f'Duplicate operation IDs found'
          print('PASS: All {0} operation IDs unique'.format(len(ops)))
          "

      - name: Verify security scheme
        run: |
          python -c "
          import json, sys
          with open('docs/api/openapi-v1.json') as f:
              schema = json.load(f)
          components = schema.get('components', {})
          sec = components.get('securitySchemes', {})
          if sec:
              print('PASS: Security schemes defined')
          elif 'security' in schema:
              print('PASS: Global security defined')
          else:
              print('FAIL: No security scheme in OpenAPI schema')
              sys.exit(1)
          "

  acceptance-summary:
    name: Acceptance summary
    needs: [environment-report, collection-check, migration-check, purge-tests, full-test-suite, docker-build, compose-stack, openapi-check]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      ENV_RESULT: "${{ needs.environment-report.result }}"
      COLL_RESULT: "${{ needs.collection-check.result }}"
      MIG_RESULT: "${{ needs.migration-check.result }}"
      PURGE_RESULT: "${{ needs.purge-tests.result }}"
      TEST_RESULT: "${{ needs.full-test-suite.result }}"
      DOCKER_RESULT: "${{ needs.docker-build.result }}"
      COMPOSE_RESULT: "${{ needs.compose-stack.result }}"
      OAPI_RESULT: "${{ needs.openapi-check.result }}"
    steps:
      - name: Summarize results
        run: |
          echo "=== P1.14 FINAL ACCEPTANCE SUMMARY ==="
          echo ""
          echo "Environment report: ${ENV_RESULT}"
          echo "Collection check: ${COLL_RESULT}"
          echo "Migration check: ${MIG_RESULT}"
          echo "Purge tests: ${PURGE_RESULT}"
          echo "Full test suite: ${TEST_RESULT}"
          echo "Docker build: ${DOCKER_RESULT}"
          echo "Compose stack: ${COMPOSE_RESULT}"
          echo "OpenAPI check: ${OAPI_RESULT}"
          echo ""

      - name: Final decision
        run: |
          FAILURES=0
          for RESULT in "${ENV_RESULT}" "${COLL_RESULT}" "${MIG_RESULT}" "${PURGE_RESULT}" "${TEST_RESULT}" "${DOCKER_RESULT}" "${COMPOSE_RESULT}" "${OAPI_RESULT}"; do
            if [ "${RESULT}" != "success" ]; then
              echo "FAIL: Job result = ${RESULT}"
              FAILURES=$((FAILURES + 1))
            fi
          done
          if [ "${FAILURES}" -gt 0 ]; then
            echo ""
            echo "FAIL — P1 TEST OR PRODUCTION BLOCKERS REMAIN (${FAILURES} jobs failed)"
            exit 1
          else
            echo ""
            echo "PASS — P1 TEST BASELINE CLEAN / READY FOR P1.14 TAGGING"
          fi
