name: P2 Core Integrate Yargitay Provider

on:
  push:
    branches: [feat/p2-core-value-dynamic-precedent-pool]

permissions:
  contents: write

jobs:
  integrate-provider:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge exact live-provider branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin feat/p2.8s-yargitay-live-provider
          PROVIDER_HEAD=$(git rev-parse origin/feat/p2.8s-yargitay-live-provider)
          test "$PROVIDER_HEAD" = "e856bc7c584b0f8ee4be104720e5591e38c0104a"
          git merge --no-ff origin/feat/p2.8s-yargitay-live-provider \
            -m "merge(sources): integrate live Yargitay provider into core value gate"
          rm .github/workflows/p2-core-integrate-yargitay-provider.yml
          git add .github/workflows/p2-core-integrate-yargitay-provider.yml
          git commit --amend --no-edit
          git push origin HEAD:feat/p2-core-value-dynamic-precedent-pool
